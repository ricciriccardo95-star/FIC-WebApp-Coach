<!DOCTYPE html>
<html lang="it" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convocazioni - FIC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <script type="module" src="../auth-manager-coach.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0F172A; color: #E2E8F0; }
        .background-gradient { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); filter: blur(100px); z-index: -1; }
        .gradient-1 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(59, 130, 246, 0.3), transparent 70%); animation: pulse 10s infinite alternate; }
        .gradient-2 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(139, 92, 246, 0.2), transparent 70%); animation: pulse 12s infinite alternate-reverse; }
        @keyframes pulse { 0% { transform: scale(0.9) rotate(0deg); } 100% { transform: scale(1.2) rotate(20deg); } }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader { border-top-color: #3498db; animation: spin 1s linear infinite; }
    </style>
</head>
<body class="antialiased" style="visibility: hidden;">

    <div class="fixed top-0 left-0 w-full h-full -z-10">
        <div class="background-gradient gradient-1"></div>
        <div class="background-gradient gradient-2"></div>
    </div>

    <div id="loader-overlay" class="fixed inset-0 bg-slate-900/80 flex flex-col justify-center items-center z-50">
        <div class="loader h-16 w-16 animate-spin rounded-full border-4 border-t-4 border-slate-600"></div>
        <p id="loader-text" class="mt-4 text-slate-300">Caricamento convocazioni...</p>
    </div>

    <div class="p-4 md:p-8 max-w-3xl mx-auto">
        
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-4xl font-black tracking-tight text-slate-100">
                Comunicazioni
            </h1>
            <a href="../coach_home.html" class="inline-block bg-slate-700/50 hover:bg-slate-600/50 text-slate-300 font-semibold py-2 px-4 rounded-lg transition-colors duration-300">
                ← Home
            </a>
        </div>

        <div class="bg-slate-900/70 border border-slate-700/50 rounded-xl backdrop-blur-lg p-4 sm:p-6">
            <p class="text-slate-400 mb-6 text-sm sm:text-base">Tocca una cartella per visualizzare i documenti al suo interno.</p>
            
            <div id="pdf-list-container" class="space-y-4">
                <p id="loading-message" class="text-slate-400 text-center py-4">Caricamento in corso...</p>
            </div>
        </div>

    </div> 
    
    <script type="module">
        import { db } from "../auth-manager-coach.js";
        import { getFirestore, collection, query, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const loaderOverlay = document.getElementById('loader-overlay');
        const pdfListContainer = document.getElementById('pdf-list-container');
        
        document.addEventListener('coachAuthStateReady', (e) => {
            const { coach, error } = e.detail;
            if (coach) {
                document.body.style.visibility = 'visible';
                loadPDFs();
            }
        });

        // Gestione apertura/chiusura dei menu a tendina
        pdfListContainer.addEventListener('click', (e) => {
            const btn = e.target.closest('.accordion-btn');
            if (btn) {
                const content = btn.nextElementSibling;
                const toggleSymbol = btn.querySelector('.toggle-symbol');
                
                content.classList.toggle('hidden');
                
                // Cambia il simbolo tra + e -
                if (content.classList.contains('hidden')) {
                    toggleSymbol.textContent = '+';
                } else {
                    toggleSymbol.textContent = '-';
                }
            }
        });

        async function loadPDFs() {
            const q = query(collection(db, "convocazioni"));

            try {
                const snapshot = await getDocs(q);
                pdfListContainer.innerHTML = ''; 
                
                if (snapshot.empty) {
                    pdfListContainer.innerHTML = `<p class="text-slate-400 text-center py-4">Nessun documento disponibile.</p>`;
                    loaderOverlay.classList.add('hidden');
                    return;
                }

                const groupedByFolder = {};

                snapshot.docs.forEach(doc => {
                    const data = doc.data();
                    const folderName = data.cartella || 'Generale';
                    
                    if (!groupedByFolder[folderName]) {
                        groupedByFolder[folderName] = [];
                    }
                    groupedByFolder[folderName].push(data);
                });

                Object.keys(groupedByFolder).sort().forEach(folderName => {
                    
                    const files = groupedByFolder[folderName];
                    files.sort((a, b) => {
                        const ordA = a.ordine !== undefined ? a.ordine : 0;
                        const ordB = b.ordine !== undefined ? b.ordine : 0;
                        if (ordA !== ordB) return ordA - ordB;
                        const timeA = a.createdAt ? a.createdAt.toMillis() : 0;
                        const timeB = b.createdAt ? b.createdAt.toMillis() : 0;
                        return timeB - timeA; 
                    });

                    const realFiles = files.filter(f => !f.isPlaceholder);

                    const folderWrapper = document.createElement('div');
                    folderWrapper.className = 'bg-slate-800 border border-slate-700 rounded-xl overflow-hidden';
                    
                    // Header della cartella: testo e un "+" sulla destra
                    const folderHeader = `
                        <button class="accordion-btn w-full flex justify-between items-center p-4 bg-slate-800 hover:bg-slate-700/80 transition-colors focus:outline-none text-left">
                            <div>
                                <h3 class="font-bold text-lg text-white">${folderName}</h3>
                                <p class="text-xs text-slate-400">${realFiles.length} document${realFiles.length === 1 ? 'o' : 'i'}</p>
                            </div>
                            <span class="toggle-symbol text-slate-400 font-bold text-2xl leading-none">+</span>
                        </button>
                    `;

                    let filesContent = `<div class="accordion-content hidden p-3 sm:p-4 bg-slate-900/50 space-y-3 border-t border-slate-700">`;
                    
                    if (realFiles.length === 0) {
                        filesContent += `<p class="text-slate-500 italic text-center py-2">Nessun documento in questa cartella.</p>`;
                    } else {
                        realFiles.forEach(fileData => {
                            const date = fileData.createdAt ? fileData.createdAt.toDate().toLocaleString('it-IT', { day: '2-digit', month: '2-digit', year: 'numeric' }) : 'Data non disp.';
                            
                            // --- FIX APPLICATO QUI ---
                            const titoloSicuro = fileData.titolo || 'Documento';
                            const fileName = fileData.fileName || `${titoloSicuro.replace(/\s+/g, '_')}.pdf`;
                            
                            // Bottoni solo testuali
                            filesContent += `
                                <div class="bg-slate-800 p-4 rounded-lg border border-slate-700 shadow-sm flex flex-col gap-4">
                                    <div>
                                        <p class="font-bold text-blue-300 text-lg leading-tight">${titoloSicuro}</p>
                                        <p class="text-sm text-slate-400 mt-1">Caricato il: ${date}</p>
                                    </div>
                                    <div class="flex flex-wrap gap-2">
                                        <a href="${fileData.url || '#'}" target="_blank" class="flex-1 text-center bg-slate-700 hover:bg-slate-600 text-white font-semibold py-2 px-3 rounded-lg transition-colors text-sm sm:text-base">
                                            Visualizza
                                        </a>
                                        <a href="${fileData.url || '#'}" download="${fileName}" target="_blank" class="flex-1 text-center bg-blue-600 hover:bg-blue-500 text-white font-semibold py-2 px-3 rounded-lg transition-colors text-sm sm:text-base">
                                            Scarica
                                        </a>
                                    </div>
                                </div>
                            `;
                        });
                    }
                    filesContent += `</div>`;

                    folderWrapper.innerHTML = folderHeader + filesContent;
                    pdfListContainer.appendChild(folderWrapper);
                });

                loaderOverlay.classList.add('hidden');
            } catch (error) {
                console.error("Errore nel caricamento Firestore: ", error);
                pdfListContainer.innerHTML = `<p class="text-red-400 text-center py-4">Errore nel caricamento dell'elenco.</p>`;
                loaderOverlay.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
